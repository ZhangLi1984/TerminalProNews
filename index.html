<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>智研金融 Terminal Pro</title>
<!-- 历史数据文件里内联了 Tailwind 类，保留 CDN 以兼容旧内容；新内容走 css/styles.css 的语义化样式 -->
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="./css/styles.css?v=3">
<script>
  // 提前应用主题，避免刷新时闪白
  (function () {
    try {
      var t = localStorage.getItem('zy-theme');
      if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.dataset.theme = t;
    } catch (e) {}
  })();
</script>
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <button id="menu-toggle" class="icon-btn" aria-label="打开目录">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>

    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      <h1 class="brand-name">智研 <span>Terminal</span></h1>
    </div>

    <nav class="tab-nav custom-scrollbar" id="tab-nav">
      <button class="tab-btn is-active" data-tab="decision">决策内参</button>
      <button class="tab-btn" data-tab="industry">行业汇总</button>
      <button class="tab-btn" data-tab="macro">宏观</button>
      <button class="tab-btn" data-tab="broker">券商</button>
      <button class="tab-btn" data-tab="stock">个股</button>
      <button class="tab-btn" data-tab="jisilu">集思录</button>
      <button class="tab-btn" data-tab="futures">期货</button>
    </nav>

    <div class="header-actions">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="doc-search" type="text" placeholder="搜索本篇  ⌘K" autocomplete="off">
        <span id="search-count"></span>
      </div>

      <div style="position:relative">
        <button id="date-selector-btn" class="date-btn" onclick="toggleDateDropdown()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span id="current-date-display">—</span>
          <span id="date-badge" class="date-badge is-latest">最新</span>
        </button>
        <div id="date-dropdown" class="hidden">
          <div class="dropdown-card">
            <div class="dropdown-search">
              <input id="date-search-input" type="text" oninput="filterDateList(this.value)" placeholder="搜索日期…" autocomplete="off">
              <button id="date-search-clear" class="hidden" onclick="clearDateSearch()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
            </div>
            <div id="date-list" class="custom-scrollbar"></div>
            <div id="date-no-results" class="hidden">无匹配日期</div>
          </div>
        </div>
      </div>

      <button id="print-btn" class="icon-btn" aria-label="打印当前报告">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      </button>

      <button id="theme-toggle" class="icon-btn" aria-label="切换主题">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.2" y1="4.2" x2="5.6" y2="5.6"/><line x1="18.4" y1="18.4" x2="19.8" y2="19.8"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.2" y1="19.8" x2="5.6" y2="18.4"/><line x1="18.4" y1="5.6" x2="19.8" y2="4.2"/></svg>
      </button>

      <div class="clock-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span id="clock">00:00:00</span>
      </div>
    </div>
  </div>
  <div class="progress-track"><div id="progress-bar"></div></div>
</header>

<div id="drawer-backdrop"></div>

<div class="layout">
  <aside class="nav-sidebar">
    <div class="nav-card custom-scrollbar">
      <div class="nav-card-title">本篇目录</div>
      <div id="decision-nav-content"></div>
      <div id="industry-nav-content" class="hidden"></div>
      <div id="macro-nav-content" class="hidden"></div>
      <div id="broker-nav-content" class="hidden"></div>
      <div id="stock-nav-content" class="hidden"></div>
      <div id="jisilu-nav-content" class="hidden"></div>
      <div id="futures-nav-content" class="hidden"></div>
    </div>
  </aside>

  <main class="content-area">
    <div id="decision-doc" class="doc-panel"><div id="decision-content" class="doc-body md-content"></div></div>
    <div id="industry-doc" class="doc-panel hidden"><div id="industry-content" class="doc-body md-content"></div></div>
    <div id="macro-doc" class="doc-panel hidden"><div id="macro-content" class="doc-body md-content"></div></div>
    <div id="broker-doc" class="doc-panel hidden"><div id="broker-content" class="doc-body md-content"></div></div>
    <div id="stock-doc" class="doc-panel hidden"><div id="stock-content" class="doc-body md-content"></div></div>
    <div id="jisilu-doc" class="doc-panel hidden"><div id="jisilu-content" class="doc-body md-content"></div></div>
    <div id="futures-doc" class="doc-panel hidden"><div id="futures-content" class="doc-body md-content"></div></div>
  </main>
</div>

<button id="back-to-top" aria-label="回到顶部">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
</button>

<!-- 核心依赖（当天/历史数据脚本全部由 app.js 按命名约定动态注入，此处不要手工添加 <script>） -->
<script src="./data/dates.js?v=3"></script>
<script src="./js/markdown.js?v=3"></script>
<script src="./js/app.js?v=3"></script>
</body>
</html>
