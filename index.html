<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智研金融 Terminal Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="./css/styles.css">
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif; background: #f8fafc; }
  .tab-btn { cursor: pointer; transition: all 0.2s; }
  .tab-btn.active { background-color: #dc2626; color: white; }
  .hidden { display: none !important; }
  #date-dropdown { position: absolute; right: 0; top: 100%; z-index: 50; min-width: 320px; }
  .nav-sidebar { width: 240px; min-width: 240px; }
  .content-area { flex: 1; min-width: 0; }
</style>
</head>
<body class="bg-slate-50 min-h-screen">

<!-- ==================== 顶部导航栏 ==================== -->
<header class="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-40">
  <div class="max-w-[1800px] mx-auto px-6">
    <div class="flex items-center justify-between h-16">
      <!-- Logo -->
      <div class="flex items-center space-x-3">
        <div class="w-8 h-8 bg-red-600 rounded-lg flex items-center justify-center">
          <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
        </div>
        <h1 class="text-lg font-black text-slate-900 tracking-tight">智研金融 <span class="text-red-600">Terminal</span></h1>
      </div>

      <!-- Tab 按钮 -->
      <nav class="flex items-center space-x-1">
        <button class="tab-btn px-4 py-2 rounded-lg text-sm font-bold bg-red-600 text-white shadow-sm" data-tab="decision">
          决策内参
        </button>
        <button class="tab-btn px-4 py-2 rounded-lg text-sm font-bold text-slate-600 hover:text-slate-900 hover:bg-slate-100" data-tab="industry">
          行业汇总
        </button>
        <button class="tab-btn px-4 py-2 rounded-lg text-sm font-bold text-slate-600 hover:text-slate-900 hover:bg-slate-100" data-tab="macro">
          宏观
        </button>
        <button class="tab-btn px-4 py-2 rounded-lg text-sm font-bold text-slate-600 hover:text-slate-900 hover:bg-slate-100" data-tab="broker">
          券商
        </button>
        <button class="tab-btn px-4 py-2 rounded-lg text-sm font-bold text-slate-600 hover:text-slate-900 hover:bg-slate-100" data-tab="stock">
          个股
        </button>
        <button class="tab-btn px-4 py-2 rounded-lg text-sm font-bold text-slate-600 hover:text-slate-900 hover:bg-slate-100" data-tab="jisilu">
          集思录
        </button>
        <button class="tab-btn px-4 py-2 rounded-lg text-sm font-bold text-slate-600 hover:text-slate-900 hover:bg-slate-100" data-tab="futures">
          期货
        </button>
      </nav>

      <!-- 右侧：日期 + 时钟 -->
      <div class="flex items-center space-x-4 relative">
        <!-- 日期选择器 -->
        <div class="relative">
          <button id="date-selector-btn" onclick="toggleDateDropdown()" class="flex items-center space-x-2 px-4 py-2 bg-slate-100 hover:bg-slate-200 rounded-xl transition-colors">
            <svg class="w-4 h-4 text-slate-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <span id="current-date-display" class="text-sm font-bold text-slate-700">2026-07-02</span>
            <svg class="w-3 h-3 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>
          <!-- 日期下拉面板 -->
          <div id="date-dropdown" class="hidden absolute right-0 top-full mt-2 bg-white rounded-2xl shadow-2xl border border-slate-200 overflow-hidden date-dropdown">
            <div class="p-3 border-b border-slate-100 relative">
              <input id="date-search-input" type="text" placeholder="搜索日期..." oninput="filterDateList(this.value)"
                class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium focus:outline-none focus:ring-2 focus:ring-red-500/20 focus:border-red-400" />
              <button id="date-search-clear" class="hidden absolute right-5 top-5 text-slate-400 hover:text-slate-600" onclick="clearDateSearch()">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
            </div>
            <div id="date-list" class="max-h-80 overflow-y-auto custom-scrollbar"></div>
            <div id="date-no-results" class="hidden px-4 py-8 text-center text-sm text-slate-400">无匹配日期</div>
          </div>
        </div>
        <!-- 时钟 -->
        <div class="flex items-center space-x-1.5 text-slate-500">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
          <span id="clock" class="text-sm font-mono font-bold tabular-nums">00:00:00</span>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- ==================== 主体区域 ==================== -->
<div class="max-w-[1800px] mx-auto px-6 py-6">
  <div class="flex gap-6">

    <!-- 左侧导航栏 -->
    <aside class="nav-sidebar hidden md:block">
      <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-4 sticky top-24 max-h-[calc(100vh-120px)] overflow-y-auto custom-scrollbar">
        <div class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 px-2">目录导航</div>
        <!-- 各 Tab 导航内容容器 -->
        <div id="decision-nav-content"></div>
        <div id="industry-nav-content" class="hidden"></div>
        <div id="macro-nav-content" class="hidden"></div>
        <div id="broker-nav-content" class="hidden"></div>
        <div id="stock-nav-content" class="hidden"></div>
        <div id="jisilu-nav-content" class="hidden"></div>
        <div id="futures-nav-content" class="hidden"></div>
      </div>
    </aside>

    <!-- 右侧内容区 -->
    <main class="content-area">
      <!-- 决策内参 -->
      <div id="decision-doc" class="bg-white rounded-2xl border border-slate-200 shadow-sm p-8 min-h-[600px]">
        <div id="decision-content" class="prose prose-slate max-w-none"></div>
      </div>
      <!-- 行业汇总 -->
      <div id="industry-doc" class="hidden bg-white rounded-2xl border border-slate-200 shadow-sm p-8 min-h-[600px]">
        <div id="industry-content" class="prose prose-slate max-w-none"></div>
      </div>
      <!-- 宏观 -->
      <div id="macro-doc" class="hidden bg-white rounded-2xl border border-slate-200 shadow-sm p-8 min-h-[600px]">
        <div id="macro-content" class="prose prose-slate max-w-none"></div>
      </div>
      <!-- 券商 -->
      <div id="broker-doc" class="hidden bg-white rounded-2xl border border-slate-200 shadow-sm p-8 min-h-[600px]">
        <div id="broker-content" class="prose prose-slate max-w-none"></div>
      </div>
      <!-- 个股 -->
      <div id="stock-doc" class="hidden bg-white rounded-2xl border border-slate-200 shadow-sm p-8 min-h-[600px]">
        <div id="stock-content" class="prose prose-slate max-w-none"></div>
      </div>
      <!-- 集思录 -->
      <div id="jisilu-doc" class="hidden bg-white rounded-2xl border border-slate-200 shadow-sm p-8 min-h-[600px]">
        <div id="jisilu-content" class="prose prose-slate max-w-none"></div>
      </div>
      <!-- 期货 -->
      <div id="futures-doc" class="hidden bg-white rounded-2xl border border-slate-200 shadow-sm p-8 min-h-[600px]">
        <div id="futures-content" class="prose prose-slate max-w-none"></div>
      </div>
    </main>

  </div>
</div>
