
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智研金融 Terminal Pro - 行业研报平台</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- 自定义样式 -->
  <link rel="stylesheet" href="./css/styles.css">

  <!-- Tailwind 配置 -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Helvetica', 'Arial', 'sans-serif']
          },
          animation: {
            'fade-in': 'fade-in 300ms ease-out',
            'slide-up': 'slide-up 400ms ease-out',
            'slide-left': 'slide-left 300ms ease-out'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 text-slate-900 font-sans antialiased">

  <!-- ==================== 顶部导航 ==================== -->
  <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-xl border-b border-slate-200/80 shadow-sm">
    <div class="max-w-[1400px] mx-auto px-4">
      <!-- 第一行：Logo + 右侧工具栏 -->
      <div class="h-14 flex items-center justify-between">
        <!-- Logo -->
        <div class="flex items-center space-x-3 cursor-pointer group">
          <div class="w-8 h-8 bg-gradient-to-br from-slate-800 to-slate-900 rounded-lg flex items-center justify-center shadow-md group-hover:shadow-lg transition-shadow">
            <svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="18" y1="20" x2="18" y2="10"></line>
              <line x1="12" y1="20" x2="12" y2="4"></line>
              <line x1="6" y1="20" x2="6" y2="14"></line>
            </svg>
          </div>
          <div class="flex items-baseline gap-1.5">
            <span class="text-lg font-black tracking-tight text-slate-900">智研金融</span>
            <span class="text-[10px] text-slate-500 font-bold tracking-wider uppercase">Terminal Pro</span>
          </div>
        </div>

        <!-- 右侧：时间 + 日期选择 -->
        <div class="flex items-center space-x-3">
          <!-- 日期选择器 -->
          <div class="relative">
            <button id="date-selector-btn" onclick="toggleDateDropdown()"
              class="flex items-center space-x-1.5 text-sm font-semibold bg-slate-50 px-3 py-1.5 rounded-lg border border-slate-200 hover:bg-slate-100 hover:border-slate-300 transition-all">
              <svg class="w-3.5 h-3.5 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
              </svg>
              <span id="current-date-display" class="text-slate-700">2026-04-21</span>
              <svg class="w-3 h-3 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="6 9 12 15 18 9"></polyline>
              </svg>
            </button>
            <!-- 日期下拉菜单 -->
            <div id="date-dropdown" class="hidden absolute right-0 mt-2 w-72 bg-white rounded-xl shadow-xl border border-slate-200 overflow-hidden z-50 animate-in slide-down">
              <!-- 搜索框 -->
              <div class="p-3 border-b border-slate-100 bg-slate-50/50">
                <div class="relative">
                  <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                  </svg>
                  <input
                    type="text"
                    id="date-search-input"
                    placeholder="搜索日期 (如：0320、3 月 20)"
                    class="w-full pl-9 pr-8 py-2 text-sm bg-white border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500/20 focus:border-red-400 transition-all"
                    oninput="filterDateList(this.value)"
                    onclick="event.stopPropagation()"
                  />
                  <button
                    id="date-search-clear"
                    onclick="clearDateSearch(); event.stopPropagation();"
                    class="hidden absolute right-2 top-1/2 -translate-y-1/2 w-5 h-5 flex items-center justify-center text-slate-400 hover:text-slate-600 rounded-full hover:bg-slate-100 transition-colors"
                  >
                    <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <line x1="18" y1="6" x2="6" y2="18"></line>
                      <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                  </button>
                </div>
              </div>
              <!-- 日期列表 -->
              <div id="date-list" class="max-h-64 overflow-y-auto custom-scrollbar">
                <!-- 由 JS 动态生成 -->
              </div>
              <!-- 无结果提示 -->
              <div id="date-no-results" class="hidden py-8 text-center">
                <svg class="w-10 h-10 mx-auto text-slate-300 mb-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <circle cx="11" cy="11" r="8"></circle>
                  <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                  <line x1="8" y1="11" x2="14" y2="11"></line>
                </svg>
                <p class="text-sm text-slate-400">未找到匹配的日期</p>
              </div>
            </div>
          </div>

          <!-- 时钟显示 -->
          <div class="flex items-center text-slate-600 text-sm font-mono font-semibold bg-slate-50 px-3 py-1.5 rounded-lg border border-slate-200">
            <svg class="w-3.5 h-3.5 mr-1.5 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <span id="clock-display">--:--:--</span>
          </div>
        </div>
      </div>

      <!-- 第二行：Tab 导航 -->
      <div class="h-11 flex items-center border-t border-slate-100/80 -mx-4 px-4">
        <nav class="flex items-center gap-1 w-full overflow-x-auto scrollbar-hide">
          <!-- 核心模块：投资决策内参（突出显示） -->
          <button
            id="tab-decision"
            data-tab="decision"
            class="tab-btn flex items-center px-4 py-2 rounded-lg text-sm font-bold transition-all duration-200 bg-red-600 text-white shadow-sm hover:bg-red-700"
          >
            <span class="w-1.5 h-1.5 bg-white rounded-full mr-2 animate-pulse"></span>
            投资决策内参
          </button>

          <div class="w-px h-5 bg-slate-200 mx-1"></div>

          <!-- 研究模块组 -->
          <button
            id="tab-industry"
            data-tab="industry"
            class="tab-btn flex items-center px-3.5 py-2 rounded-lg text-sm font-semibold transition-all duration-200 text-slate-600 hover:text-slate-900 hover:bg-slate-100"
          >
            行业研究
          </button>
          <button
            id="tab-macro"
            data-tab="macro"
            class="tab-btn flex items-center px-3.5 py-2 rounded-lg text-sm font-semibold transition-all duration-200 text-slate-600 hover:text-slate-900 hover:bg-slate-100"
          >
            宏观研究
          </button>
          <button
            id="tab-stock"
            data-tab="stock"
            class="tab-btn flex items-center px-3.5 py-2 rounded-lg text-sm font-semibold transition-all duration-200 text-slate-600 hover:text-slate-900 hover:bg-slate-100"
          >
            个股研报
          </button>

          <div class="w-px h-5 bg-slate-200 mx-1"></div>

          <!-- 资讯模块组 -->
          <button
            id="tab-broker"
            data-tab="broker"
            class="tab-btn flex items-center px-3.5 py-2 rounded-lg text-sm font-semibold transition-all duration-200 text-slate-600 hover:text-slate-900 hover:bg-slate-100"
          >
            券商晨报
          </button>
          <button
            id="tab-jisilu"
            data-tab="jisilu"
            class="tab-btn flex items-center px-3.5 py-2 rounded-lg text-sm font-semibold transition-all duration-200 text-slate-600 hover:text-slate-900 hover:bg-slate-100"
          >
            集思录
          </button>
          <button
            id="tab-futures"
            data-tab="futures"
            class="tab-btn flex items-center px-3.5 py-2 rounded-lg text-sm font-semibold transition-all duration-200 text-slate-600 hover:text-slate-900 hover:bg-slate-100"
          >
            期货市场
          </button>
        </nav>
      </div>
    </div>
  </header>

  <!-- ==================== 主体内容 ==================== -->

    <div id="main-content" class="w-full">

            <div class="space-y-6" id="decision-nav-content">
              <!-- 由 JS 动态生成 -->
            </div>
          </aside>

          <!-- 右侧内容 -->

    </div>
  </main>
