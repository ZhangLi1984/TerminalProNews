  <link rel="stylesheet" href="./css/styles.css">

          animation: {
            'fade-in': 'fade-in 300ms ease-out',

          >
            <svg class="w-4 h-4 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

              <circle cx="12" cy="12" r="2"></circle>
            </svg>
            投资决策内参
          </button>
          <button
            id="tab-industry"

            <svg class="w-4 h-4 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
