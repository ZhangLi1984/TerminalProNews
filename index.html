<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智研金融 Terminal Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="./css/styles.css?v=2">
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC','PingFang SC',sans-serif;background:#f1f5f9}
.tab-btn{cursor:pointer;transition:all .15s;user-select:none}
.nav-sidebar{width:220px;min-width:220px}
.nav-sidebar a{display:block;padding:6px 10px;font-size:13px;color:#475569;border-radius:8px;text-decoration:none;transition:all .15s;line-height:1.4}
.nav-sidebar a:hover{background:#f1f5f9;color:#0f172a}
.content-area{flex:1;min-width:0}
.doc-panel{background:#fff;border-radius:16px;border:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.04)}
/* 内容区排版优化 */
.doc-panel .prose{max-width:none}
.doc-panel .prose h2{font-size:1.25rem;font-weight:900;color:#0f172a;margin-top:2rem;margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:2px solid #e2e8f0;display:flex;align-items:center;line-height:1.5}
.doc-panel .prose h2::before{content:'';display:inline-block;width:4px;height:1.1em;background:#dc2626;border-radius:2px;margin-right:.7rem;flex-shrink:0}
.doc-panel .prose h3{font-size:1.05rem;font-weight:800;color:#1e293b;margin-top:1.5rem;margin-bottom:.5rem;line-height:1.5}
.doc-panel .prose h4{font-size:.95rem;font-weight:700;color:#334155;margin-top:1.2rem;margin-bottom:.4rem}
.doc-panel .prose p{font-size:.875rem;color:#334155;line-height:1.9;margin-bottom:.75rem}
.doc-panel .prose strong{color:#0f172a}
.doc-panel .prose ol,.doc-panel .prose ul{margin:.7rem 0;padding-left:1.4rem}
.doc-panel .prose li{font-size:.85rem;color:#334155;line-height:1.85;margin-bottom:.4rem}
.doc-panel .prose li strong{color:#0f172a}
.doc-panel .prose table{width:100%;border-collapse:collapse;margin:1rem 0;font-size:.84rem}
.doc-panel .prose th{background:#f8fafc;padding:10px 14px;font-weight:800;color:#0f172a;text-align:left;border-bottom:2px solid #e2e8f0}
.doc-panel .prose td{padding:10px 14px;border-bottom:1px solid #f1f5f9;color:#334155}
.doc-panel .prose tr:hover td{background:#fafbfd}
.doc-panel .prose blockquote{border-left:4px solid #dc2626;background:#f8fafc;padding:1rem 1.2rem;margin:1rem 0;border-radius:0 8px 8px 0}
.doc-panel .prose blockquote p{margin-bottom:.3rem;color:#1e293b}
.doc-panel .prose code{background:#f1f5f9;padding:2px 6px;border-radius:4px;font-size:.8rem;color:#dc2626}
.doc-panel .prose a{color:#2563eb;text-decoration:underline}
.no-data{text-align:center;padding:80px 20px;color:#94a3b8}
.loading-state{text-align:center;padding:80px 20px;color:#94a3b8}
.loading-state p{margin-top:12px;font-size:.875rem;font-weight:500}
</style>
</head>
<body class="min-h-screen">
<header class="bg-white border-b border-slate-200 sticky top-0 z-40">
<div class="max-w-[1600px] mx-auto px-4 lg:px-6">
<div class="flex items-center justify-between h-14">
<div class="flex items-center space-x-2.5 flex-shrink-0">
<div class="w-7 h-7 bg-red-600 rounded-lg flex items-center justify-center">
<svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
</div>
<h1 class="text-base font-black text-slate-900 tracking-tight hidden sm:block">智研 <span class="text-red-600">Terminal</span></h1>
</div>
<nav class="flex items-center gap-0.5 overflow-x-auto" id="tab-nav">
<button class="tab-btn active px-4 py-1.5 rounded-lg text-xs font-bold bg-red-600 text-white shadow-sm" data-tab="decision">决策内参</button>
<button class="tab-btn px-4 py-1.5 rounded-lg text-xs font-bold text-slate-500 hover:text-slate-900 hover:bg-slate-100 transition-colors" data-tab="industry">行业汇总</button>
<button class="tab-btn px-4 py-1.5 rounded-lg text-xs font-bold text-slate-500 hover:text-slate-900 hover:bg-slate-100 transition-colors" data-tab="macro">宏观</button>
<button class="tab-btn px-4 py-1.5 rounded-lg text-xs font-bold text-slate-500 hover:text-slate-900 hover:bg-slate-100 transition-colors" data-tab="broker">券商</button>
<button class="tab-btn px-4 py-1.5 rounded-lg text-xs font-bold text-slate-500 hover:text-slate-900 hover:bg-slate-100 transition-colors" data-tab="stock">个股</button>
<button class="tab-btn px-4 py-1.5 rounded-lg text-xs font-bold text-slate-500 hover:text-slate-900 hover:bg-slate-100 transition-colors" data-tab="jisilu">集思录</button>
<button class="tab-btn px-4 py-1.5 rounded-lg text-xs font-bold text-slate-500 hover:text-slate-900 hover:bg-slate-100 transition-colors" data-tab="futures">期货</button>
</nav>
<div class="flex items-center gap-3 relative flex-shrink-0">
<div class="relative">
<button id="date-selector-btn" onclick="toggleDateDropdown()" class="flex items-center gap-1.5 px-3 py-1.5 bg-slate-50 hover:bg-slate-100 rounded-lg transition-colors border border-slate-200">
<svg class="w-3.5 h-3.5 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
<span id="current-date-display" class="text-xs font-bold text-slate-700">2026-07-07</span>
<svg class="w-3 h-3 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
</button>
<div id="date-dropdown" class="hidden" style="position:absolute;right:0;top:calc(100% + 8px);z-index:50;width:340px">
<div class="bg-white rounded-xl shadow-2xl border border-slate-200 overflow-hidden">
<div class="p-2.5 border-b border-slate-100 relative">
<input id="date-search-input" type="text" oninput="filterDateList(this.value)" placeholder="搜索日期..." class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm font-medium focus:outline-none focus:ring-2 focus:ring-red-500/20 focus:border-red-400"/>
<button id="date-search-clear" onclick="clearDateSearch()" class="hidden absolute right-4 top-4 text-slate-400 hover:text-slate-600"><svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
</div>
<div id="date-list" class="max-h-72 overflow-y-auto custom-scrollbar"></div>
<div id="date-no-results" class="hidden px-4 py-6 text-center text-sm text-slate-400">无匹配日期</div>
</div>
</div>
</div>
<div class="hidden sm:flex items-center gap-1 text-slate-400">
<svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
<span id="clock" class="text-xs font-mono font-bold tabular-nums">00:00:00</span>
</div>
</div>
</div>
</div>
</header>
<div class="max-w-[1600px] mx-auto px-4 lg:px-6 py-4">
<div class="flex gap-4">
<aside class="nav-sidebar hidden lg:block">
<div class="bg-white rounded-xl border border-slate-200 p-3 sticky top-20 max-h-[calc(100vh-100px)] overflow-y-auto custom-scrollbar">
<div id="decision-nav-content"></div>
<div id="industry-nav-content" class="hidden"></div>
<div id="macro-nav-content" class="hidden"></div>
<div id="broker-nav-content" class="hidden"></div>
<div id="stock-nav-content" class="hidden"></div>
<div id="jisilu-nav-content" class="hidden"></div>
<div id="futures-nav-content" class="hidden"></div>
</div>
</aside>
<main class="content-area">
<div id="decision-doc" class="doc-panel p-6 lg:p-8 min-h-[500px]"><div id="decision-content" class="prose max-w-none"></div></div>
<div id="industry-doc" class="hidden doc-panel p-6 lg:p-8 min-h-[500px]"><div id="industry-content" class="prose max-w-none"></div></div>
<div id="macro-doc" class="hidden doc-panel p-6 lg:p-8 min-h-[500px]"><div id="macro-content" class="prose max-w-none"></div></div>
<div id="broker-doc" class="hidden doc-panel p-6 lg:p-8 min-h-[500px]"><div id="broker-content" class="prose max-w-none"></div></div>
<div id="stock-doc" class="hidden doc-panel p-6 lg:p-8 min-h-[500px]"><div id="stock-content" class="prose max-w-none"></div></div>
<div id="jisilu-doc" class="hidden doc-panel p-6 lg:p-8 min-h-[500px]"><div id="jisilu-content" class="prose max-w-none"></div></div>
<div id="futures-doc" class="hidden doc-panel p-6 lg:p-8 min-h-[500px]"><div id="futures-content" class="prose max-w-none"></div></div>
</main>
</div>
</div>

<script src="./data/decision-0706-nav.js?v=2"></script>

<script src="./data/jisilu-0706-content.js?v=2"></script>
<!-- 前一日期数据（0705 全模块） -->
<script src="./data/decision-0705-nav.js?v=2"></script>
<script src="./data/decision-0705-content.js?v=2"></script>
<script src="./data/macro-0705-nav.js?v=2"></script>
<script src="./data/macro-0705-content.js?v=2"></script>

<script src="./data/jisilu-0705-content.js?v=2"></script>
<script src="./data/industry-0705-nav.js?v=2"></script>

<script src="./data/broker-0705-nav.js?v=2"></script>
<script src="./data/broker-0705-content.js?v=2"></script>
<script src="./data/stock-0705-nav.js?v=2"></script>

</body>
</html>
